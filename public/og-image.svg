<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3b4a"/>
      <stop offset="100%" stop-color="#1a2330"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative mark -->
  <g transform="translate(820, 180)">
    <circle cx="80" cy="80" r="58" fill="url(#sun)"/>
    <g stroke="#f59e0b" stroke-width="6" stroke-linecap="round">
      <line x1="80" y1="0" x2="80" y2="12"/>
      <line x1="80" y1="148" x2="80" y2="160"/>
      <line x1="0" y1="80" x2="12" y2="80"/>
      <line x1="148" y1="80" x2="160" y2="80"/>
      <line x1="23" y1="23" x2="32" y2="32"/>
      <line x1="128" y1="128" x2="137" y2="137"/>
      <line x1="137" y1="23" x2="128" y2="32"/>
      <line x1="32" y1="128" x2="23" y2="137"/>
    </g>
    <g fill="#ffffff" stroke="#1a2330" stroke-width="5" stroke-linejoin="round">
      <path d="M 120 180
               Q 120 140, 170 140
               Q 190 110, 230 115
               Q 270 110, 280 150
               Q 325 155, 320 200
               Q 315 225, 280 225
               L 140 225
               Q 110 225, 120 180 Z"/>
    </g>
    <g fill="#3b82f6">
      <path d="M 170 250 Q 170 275, 180 285 Q 190 275, 190 250 Q 180 240, 170 250 Z"/>
      <path d="M 220 265 Q 220 290, 230 300 Q 240 290, 240 265 Q 230 255, 220 265 Z"/>
      <path d="M 270 250 Q 270 275, 280 285 Q 290 275, 290 250 Q 280 240, 270 250 Z"/>
    </g>
  </g>

  <!-- Text -->
  <g font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" fill="#ffffff">
    <text x="80" y="240" font-size="96" font-weight="700" letter-spacing="-2">
      CanIDoIt<tspan fill="#22c55e">.</tspan>today
    </text>
    <text x="80" y="320" font-size="44" font-weight="600" fill="#ffffff" opacity="0.95">
      Don't guess at the weather.
    </text>
    <text x="80" y="380" font-size="28" font-weight="400" fill="#ffffff" opacity="0.7">
      Instant weather checks for 45+ outdoor
    </text>
    <text x="80" y="418" font-size="28" font-weight="400" fill="#ffffff" opacity="0.7">
      projects — concrete, paint, roofing, lawn.
    </text>
  </g>

  <!-- Status dots -->
  <g transform="translate(80, 500)">
    <circle cx="10" cy="10" r="10" fill="#22c55e"/>
    <text x="32" y="16" font-family="'Inter', system-ui" font-size="20" font-weight="500" fill="#ffffff">Good to go</text>

    <circle cx="210" cy="10" r="10" fill="#f59e0b"/>
    <text x="232" y="16" font-family="'Inter', system-ui" font-size="20" font-weight="500" fill="#ffffff">Use caution</text>

    <circle cx="410" cy="10" r="10" fill="#ef4444"/>
    <text x="432" y="16" font-family="'Inter', system-ui" font-size="20" font-weight="500" fill="#ffffff">Not today</text>
  </g>
</svg>
